name: CI/CD Pipeline

on:
  push:
    branches: [ master ]

jobs:
  build-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set short SHA
        run: echo "SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_ENV

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/flask-time:${{ env.SHORT_SHA }}
            ${{ secrets.DOCKER_USERNAME }}/flask-time:latest

      - name: Update Helm chart image tag
        run: |
          sed -i "s/tag: .*/tag: \"${{ env.SHORT_SHA }}\"/" helm/flask-app/values.yaml
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add helm/flask-app/values.yaml
          git commit -m "Update image tag to ${{ env.SHORT_SHA }}" || echo "No changes to commit"
          git push